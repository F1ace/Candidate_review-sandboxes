services:
  db:
    image: pgvector/pgvector:pg16
    container_name: reviewer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reviewer"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: reviewer-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/reviewer
      SANDBOX_CODE_URL: http://sandbox-code:8001/run_code
      SANDBOX_SQL_URL: http://sandbox-sql:8002/run_sql
      LM_STUDIO_URL: http://host.docker.internal:1234/v1/chat/completions
      LM_MODEL: openai/gpt-oss-20b
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: rag-documents
      MINIO_SECURE: "false"
      ALLOW_ORIGINS: "*"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      - db
      - minio
      - sandbox-code
      - sandbox-sql

  sandbox-code:
    build:
      context: ./sandbox-code
      dockerfile: Dockerfile
    ports:
      - "8001:8001"

  sandbox-sql:
    build:
      context: ./sandbox-sql
      dockerfile: Dockerfile
    ports:
      - "8002:8002"

volumes:
  postgres_data:
  minio_data:
